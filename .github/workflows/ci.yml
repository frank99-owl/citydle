name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run build 2>&1 | grep -E "Compiled|Linting|Error|Warning" || true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
